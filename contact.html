<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta for responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="styles.css" rel="stylesheet">

    <title>TaskFlow - Contact</title>
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
        <div class="container">

            <!-- Brand -->
            <a class="navbar-brand fw-bold text-primary" href="index.html">
                ✓ TaskFlow
            </a>

            <!-- Mobile toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="ms-auto">
                    <a class="nav-link d-inline mx-2" href="index.html">Home</a>
                    <a class="nav-link d-inline mx-2" href="tasks.html">Tasks</a>
                    <a class="nav-link d-inline mx-2" href="features.html">Features</a>
                    <a class="nav-link d-inline mx-2 fw-semibold text-primary" href="contact.html">Contact</a>
                </div>
            </div>

        </div>
    </nav>

    <!-- ================= CONTACT SECTION ================= -->
    <section class="py-5 text-center">
        <div class="container">

            <!-- Icon -->
            <div class="icon-circle mb-3">✉</div>

            <!-- Title -->
            <h1 class="display-5 fw-bold">Get in Touch</h1>

            <!-- Subtitle -->
            <p class="lead text-muted">
                Have questions? We'd love to hear from you.
            </p>

            <!-- ================= FORM CARD ================= -->
            <div class="d-flex justify-content-center mt-4">
                <div class="card shadow-lg p-4 w-100" style="max-width: 500px; border-radius: 15px;">

                    <!-- Success message (hidden initially) -->
                    <div id="successMessage" class="alert alert-success d-none">
                        Message sent successfully!
                    </div>

                    <!-- Contact Form -->
                    <form onsubmit="handleSubmit(event)">

                        <!-- Name -->
                        <div class="mb-3 text-start">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" placeholder="Your name" required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3 text-start">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="your.email@example.com" required>
                        </div>

                        <!-- Message -->
                        <div class="mb-3 text-start">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="5" placeholder="Your message..." required></textarea>
                        </div>

                        <!-- Submit Button -->
                        <button class="btn btn-primary w-100">
                            ✈ Send Message
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </section>

    <!-- ================= FOOTER ================= -->
    <footer class="text-center mt-5 py-4 text-muted">
        <small>© 2026 TaskFlow</small>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Inline JS for form -->
    <script>
        // Handles form submission (no backend, just UI feedback)
        function handleSubmit(event) {
            event.preventDefault();

            // Show success message
            document.getElementById("successMessage").classList.remove("d-none");

            // Reset form fields
            event.target.reset();
        }
    </script>

</body>
</html>
